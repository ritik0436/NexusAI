<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- N+ cross mark: vertical + horizontal line -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="url(#cross)" stroke-width="7" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="50" y2="32" stroke="url(#cross)" stroke-width="7" stroke-linecap="round"/>
</svg>
